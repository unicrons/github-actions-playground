name: Secrets Scan 

on:
  workflow_call:
    outputs:
      scan-result:
        description: "Secrets scan result"
        value: ${{ jobs.secrets-scan.outputs.result }}

jobs:
  secrets-scan:
    name: Secrets Scan with TruffleHog
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.scan-result.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secrets scanner
        id: scan-tool
        run: |
          # Install TruffleHog
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Run trufflehog
          trufflehog git file://. \
          --github-actions \
          --no-verification \
          --filter-entropy=1.0 \
          --results="verified,unknown,unverified,filtered_unverified" \
          --since-commit origin/${{ github.event.repository.default_branch }} \
          --branch ${{ github.ref }} \
          --fail

      - name: Set scan result
        id: scan-result
        if: always()
        run: |
          if [ "${{ steps.scan-tool.outcome }}" == "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "✅ Secrets scan passed - no secrets detected"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "❌ Secrets scan failed - secrets detected in repository"
            exit 1
          fi